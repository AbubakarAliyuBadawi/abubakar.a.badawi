    Projects:
      - name: Mission Planning for Small Residence Underwater Vehicle
        summary: Designed and implemented a mission management system using Finite State Machines (FSM) in ROS2 for the Blueye X3 underwater ROV for autonomous pipeline inspections and docking operations.
        highlights:
          - "Tools: Python, ROS2, Gazebo, Blueye SDK"
          - Developed energy-aware algorithms for dynamic battery management and optimized return-to-dock velocity planning.
        url: https://github.com/AbubakarAliyuBadawi/blueyeROV_mission_planner
        start_date: 2024-12-01
        end_date: 2024-12-01

      - name: Open-World Semantic Segmentation for Underwater Shiphull Inspection
        summary: Developed an open-world semantic segmentation framework for underwater ship hull inspection using the LIACI dataset, achieving 50% mIoU with a dual-decoder architecture.
        highlights:
          - "Tools: Python, PyTorch, OpenCV"
          - Adapted and fine-tuned loss functions (objectosphere and contrastive loss) for underwater anomalies.
        url: https://github.com/AbubakarAliyuBadawi/Underwater-ship-hull-Inspection-using-LIACi-dataset
        start_date: 2024-11-01
        end_date: 2024-11-01

      - name: Dynamic Positioning System Design for Marine Vessels
        summary: Developed a comprehensive Dynamic Positioning (DP) system using MATLAB/Simulink, implementing Extended Kalman Filter and Nonlinear Passive Observer for state estimation.
        highlights:
          - "Tools: MATLAB, Simulink, MSS Toolbox"
          - Designed thrust allocation algorithms and conducted extensive simulations under various environmental conditions.
        url: https://github.com/AbubakarAliyuBadawi/Marine-DP-Controller
        start_date: 2024-09-01
        end_date: 2024-09-01

      - name: "Evaluating w2v-BERT-2.0 Speech Tokenizer for Language Models"
        summary: Enhanced speech-to-speech translation by integrating the W2v-BERT-2.0 tokenizer into Conformer-based speech models, improving linguistic performance by 5%.
        highlights:
          - "Tools: Python, TensorFlow, NLP, SLURM"
          - Optimized large-scale model training on HPC clusters with SLURM, utilizing wandb for real-time monitoring.
        url: https://github.com/AbubakarAliyuBadawi/Evaluating-w2v-BERT-2.0-Speech-Tokenizer-in-Language-Models
        start_date: 2024-04-01
        end_date: 2024-04-01

      - name: BlueROV Visual Servoing & Autonomous Navigation
        summary: Enhanced underwater robotic navigation by integrating high-resolution visual servoing with advanced camera systems on the BlueROV.
        highlights:
          - "Tools: Python, ROS, OpenCV"
          - Developed autonomous navigation algorithms using sonar and IMU feedback, PID control and alpha-beta filtering.
        url: https://github.com/AbubakarAliyuBadawi/BlueROV-Visual-Servoing-and-Navigation
        start_date: 2024-03-01
        end_date: 2024-03-01

