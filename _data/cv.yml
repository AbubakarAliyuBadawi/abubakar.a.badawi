    Research Experience:
      - company: Applied Underwater Robotics Lab (AURLab)
        position: Master Thesis Intern
        location: Trondheim, Norway
        start_date: 2024-08-01
        end_date: 2025-06-01
        highlights:
          - Developed a hybrid Behavior Tree-based mission planner in ROS2 to transform the Blueye ROV into a fully autonomous resident underwater vehicle capable of long-duration inspection missions.
          - Integrated reinforcement learning using Q-learning into the mission architecture to enable adaptive task prioritization based on battery state, sensor feedback, and mission progress.
          - Validated the complete autonomous control system in Gazebo simulations and real-world field trials with the Blueye ROV in Trondheim Fjord.

      - company: Laboratoire d'Informatique et Systèmes (LISLab)
        position: Deep-Learning Intern
        location: Toulon, France
        start_date: 2024-06-01
        end_date: 2024-08-01
        highlights:
          - Investigated the semantic performance improvement of speech-language models by synthesizing the LibriLight dataset (60k hours) using TensorFlow's FastSpeech2 and MB-MelGAN vocoder.
          - Developed scripts and algorithms in Python for data processing and model training on HPC clusters using SLURM for job scheduling.
          - Utilized Weights & Biases (WandB) for real-time visualization of the training process.

    Experience:
      - company: Vortex NTNU
        position: "Robotics Software Engineer: Autonomous Systems"
        location: Trondheim, Norway
        url: https://github.com/vortexntnu/vortex-auv
        start_date: 2024-09-01
        end_date: 2025-08-01
        highlights:
          - Developed a ROS2 action server implementing 3D Line-of-Sight guidance with adaptive parameter estimation for autonomous underwater vehicles, featuring real-time path following, sideslip compensation, and third-order filtering.
          - Implemented path-tangential frame transformations and distance-based velocity control based on Fossen's Marine Craft Hydrodynamics models, enabling precise waypoint navigation.

